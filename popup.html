<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 24px;
    }
    .title {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }
    .shortcut {
      font-size: 22px;
      text-align: center;
      padding: 14px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .shortcut .mod { color: #666; }
    .shortcut .key { color: #333; font-weight: 600; }
    .shortcut.empty { color: #bbb; font-size: 13px; }
    .btn {
      width: 100%;
      background: #333;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      opacity: 0.4;
    }
    .btn.active { opacity: 1; }
    .btn:hover { background: #444; }
    .msg {
      text-align: center;
      font-size: 12px;
      color: #333;
      margin-top: 12px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="title">Toggle Tab</div>
  <p class="hint">按下快捷键</p>
  <div class="shortcut" id="shortcut">
    <span class="empty">等待输入...</span>
  </div>
  <button class="btn" id="saveBtn" disabled>保存</button>
  <div class="msg" id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
